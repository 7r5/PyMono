<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyMono - Desgracias</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    @media print {
      /* Override global @page: 3mm margins so 3×9cm fits on landscape letter */
      @page { size: auto; margin: 3mm; }
      .app-header, .app-header *,
      .section-nav, .section-nav *,
      .btn-color, .actions, .actions * {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>PyMono</h1>
    </div>
    <div class="actions">
      <button id="btn-color" class="btn-color">✦ Con color de fondo</button>
      <button onclick="window.print()">Imprimir / Guardar PDF</button>
    </div>
  </header>

  <nav class="section-nav">
    <a href="/" class="nav-tab">Propiedades</a>
    <a href="/fortunas" class="nav-tab">Fortunas</a>
    <a href="/desgracias" class="nav-tab nav-tab--active">Desgracias</a>
    <a href="/reversos" class="nav-tab">Reversos</a>
    <a href="/billetes" class="nav-tab">Billetes</a>
    <span class="nav-tab nav-tab--disabled">Tablero</span>
  </nav>

  <p class="section-description">Desgracias — tarjetas horizontales 9×5.8 cm.</p>

  <main>
    <div class="fyd-grid">
      {% for card in desgracias %}
        {% if loop.index0 % 3 == 0 %}<div class="fyd-print-row">{% endif %}
        <article class="fyd-card fyd-card--desgracia">
          <div class="fyd-bar"><span class="fyd-tipo">DESGRACIA</span></div>
          <div class="fyd-body">
            <p class="fyd-texto">{{ card.texto }}</p>
            <div class="fyd-image"><span class="fyd-image-label">IMG</span></div>
          </div>
        </article>
        {% if loop.index0 % 3 == 2 or loop.last %}</div>{% endif %}
      {% endfor %}
    </div>
  </main>

  <script>
    const btn = document.getElementById('btn-color');
    const grid = document.querySelector('.fyd-grid');

    function setColorMode(activo) {
      grid.classList.toggle('fyd-colores', activo);
      btn.classList.toggle('is-active', activo);
      btn.textContent = activo ? '✦ Sin color de fondo' : '✦ Con color de fondo';
    }

    setColorMode(localStorage.getItem('fydColorDesgracias') === '1');

    btn.addEventListener('click', () => {
      const activo = !grid.classList.contains('fyd-colores');
      localStorage.setItem('fydColorDesgracias', activo ? '1' : '0');
      setColorMode(activo);
    });
  </script>
</body>
</html>
